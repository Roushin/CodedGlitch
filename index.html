<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gilded Glitch</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
// --- GAME CONFIG ---
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 450,
    backgroundColor: '#0d0d1a',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1200 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, platforms, coins, boss, projectiles;
let score = 0;
let hp = 100;
let gameState = 'MENU'; // MENU, PLAY, SHOP, BOSS
let selectedHero = null;
let controls = {};

function preload() {
    // No external images needed - we will generate them in 'create'
}

function create() {
    // 1. Create Graphics-based Textures (Ensures no black screen)
    const graphics = this.make.graphics({ x: 0, y: 0, add: false });
    
    // Create Player Texture
    graphics.fillStyle(0xffffff);
    graphics.fillRect(0, 0, 32, 48);
    graphics.generateTexture('hero', 32, 48);
    graphics.clear();

    // Create Floor Texture
    graphics.fillStyle(0x22aa22);
    graphics.fillRect(0, 0, 800, 40);
    graphics.generateTexture('ground', 800, 40);
    graphics.clear();

    // Create Coin Texture
    graphics.fillStyle(0xffd700);
    graphics.fillCircle(8, 8, 8);
    graphics.generateTexture('gold', 16, 16);
    graphics.clear();

    // 2. Setup Menu
    this.menuText = this.add.text(400, 100, 'THE GILDED GLITCH', { fontSize: '40px', fill: '#ffd700', fontStyle: 'bold' }).setOrigin(0.5);
    this.loreText = this.add.text(400, 180, 'The Buffer Virus is pixelating the world.\nChoose your Hero to restore resolution!', { fontSize: '18px', fill: '#fff', align: 'center' }).setOrigin(0.5);

    // Character Buttons
    this.createBtn(400, 280, 'AXEL (High HP)', 0xff4444, () => startLevel(this, {speed: 200, jump: -550, hp: 150, color: 0xff4444}));
    this.createBtn(400, 350, 'REI (High Speed)', 0x44ffff, () => startLevel(this, {speed: 380, jump: -650, hp: 80, color: 0x44ffff}));
}

function createBtn(x, y, label, color, callback) {
    const scene = game.scene.scenes[0];
    let b = scene.add.text(x, y, label, { fontSize: '24px', backgroundColor: '#333', padding: 12 }).setOrigin(0.5).setInteractive();
    b.on('pointerdown', callback);
}

function startLevel(scene, data) {
    selectedHero = data;
    gameState = 'PLAY';
    scene.menuText.destroy();
    scene.loreText.destroy();
    
    // Platforms
    platforms = scene.physics.add.staticGroup();
    platforms.create(400, 430, 'ground');
    platforms.create(600, 300, 'ground').setScale(0.3, 1).refreshBody();

    // Player
    player = scene.physics.add.sprite(100, 350, 'hero').setTint(data.color);
    player.setCollideWorldBounds(true);
    scene.physics.add.collider(player, platforms);

    // Coins
    coins = scene.physics.add.group();
    for(let i=0; i<5; i++) {
        coins.create(200 + (i*120), 300, 'gold').setBounceY(0.4);
    }
    scene.physics.add.collider(coins, platforms);
    scene.physics.add.overlap(player, coins, (p, c) => { c.destroy(); score += 10; scene.scoreDisplay.setText('GOLD: ' + score); });

    // HUD
    scene.scoreDisplay = scene.add.text(20, 20, 'GOLD: 0', { fontSize: '20px', fill: '#ffd700' });
    
    // MOBILE CONTROLS
    let ctrlStyle = { fontSize: '30px', backgroundColor: '#444', padding: 15 };
    controls.left = scene.add.text(60, 380, ' < ', ctrlStyle).setInteractive().setScrollFactor(0);
    controls.right = scene.add.text(180, 380, ' > ', ctrlStyle).setInteractive().setScrollFactor(0);
    controls.jump = scene.add.text(680, 380, 'UP', ctrlStyle).setInteractive().setScrollFactor(0);

    controls.lDown = false; controls.rDown = false;
    controls.left.on('pointerdown', () => controls.lDown = true).on('pointerup', () => controls.lDown = false);
    controls.right.on('pointerdown', () => controls.rDown = true).on('pointerup', () => controls.rDown = false);
    controls.jump.on('pointerdown', () => { if(player.body.touching.down) player.setVelocityY(selectedHero.jump); });
}

function update() {
    if (gameState === 'PLAY' && player) {
        if (controls.lDown) player.setVelocityX(-selectedHero.speed);
        else if (controls.rDown) player.setVelocityX(selectedHero.speed);
        else player.setVelocityX(0);

        // Transition to Boss logic could trigger here when score > 50
        if(score >= 50 && !boss) spawnBoss(this);
    }
}

function spawnBoss(scene) {
    const graphics = scene.make.graphics({ x: 0, y: 0, add: false });
    graphics.fillStyle(0x555555);
    graphics.fillRect(0,0, 100, 150);
    graphics.generateTexture('bossTex', 100, 150);
    
    boss = scene.physics.add.sprite(700, 300, 'bossTex');
    scene.physics.add.collider(boss, platforms);
    scene.add.text(700, 100, 'GIGABYTE GOLEM', { fill: '#ff0000' }).setOrigin(0.5);
}
</script>
</body>
</html>
