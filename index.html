<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Pixel World</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #shop-ui { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); border: 2px solid gold; padding: 20px;
            color: white; display: none; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>
    <div id="shop-ui">
        <h2>SHOP</h2>
        <button onclick="buyItem('jump')">Jump Boost (30 Gold)</button><br><br>
        <button onclick="closeShop()">Exit Shop</button>
    </div>
<script>
const config = {
    type: Phaser.CANVAS, 
    width: 800, height: 450,
    backgroundColor: '#5c94fc', // Classic Mario Blue
    physics: { default: 'arcade', arcade: { gravity: { y: 1000 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, platforms, coins, enemies, cursors;
let score = 0; let controls = {};

function preload() {}

function create() {
    let g = this.make.graphics({ x: 0, y: 0, add: false });
    
    // Create Hero Sprite
    g.fillStyle(0xff0000).fillRect(0, 0, 30, 30); // Body
    g.fillStyle(0x000000).fillRect(20, 5, 5, 5);  // Eye
    g.generateTexture('hero', 30, 30); g.clear();

    // Create Platform Sprite
    g.fillStyle(0x8b4513).fillRect(0, 0, 40, 40); // Brown Brick
    g.lineStyle(2, 0x000000).strokeRect(0,0,40,40);
    g.generateTexture('brick', 40, 40); g.clear();

    // Create Enemy Sprite
    g.fillStyle(0x800080).fillRect(0,0,30,30);
    g.generateTexture('enemy', 30, 30); g.clear();

    // Create Coin
    g.fillStyle(0xffff00).fillCircle(10, 10, 10);
    g.generateTexture('coin', 20, 20);

    // Build Stage
    platforms = this.physics.add.staticGroup();
    for(let i=0; i<20; i++) platforms.create(i*40, 430, 'brick'); // Ground
    platforms.create(200, 300, 'brick'); platforms.create(240, 300, 'brick'); // Floating
    platforms.create(400, 200, 'brick');

    // Player
    player = this.physics.add.sprite(50, 300, 'hero');
    player.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // Enemies
    enemies = this.physics.add.group();
    let e = enemies.create(400, 380, 'enemy');
    e.setCollideWorldBounds(true).setVelocityX(100);
    this.physics.add.collider(enemies, platforms);
    this.physics.add.overlap(player, enemies, (p, enemy) => {
        if(p.body.touching.down && enemy.body.touching.up) {
            enemy.destroy(); p.setVelocityY(-300); // Stomp like Mario
        } else {
            location.reload(); // Game Over
        }
    });

    // Coins
    coins = this.physics.add.group({ key: 'coin', repeat: 5, setXY: { x: 150, y: 0, stepX: 100 } });
    this.physics.add.collider(coins, platforms);
    this.physics.add.overlap(player, coins, (p, c) => { c.destroy(); score += 10; scoreText.setText('GOLD: ' + score); });

    // UI
    let scoreText = this.add.text(16, 16, 'GOLD: 0', { fontSize: '24px', fill: '#fff' });

    // Mobile Buttons
    let bStyle = { fontSize: '20px', backgroundColor: '#333', padding: 15 };
    this.add.text(20, 380, 'LEFT', bStyle).setInteractive().on('pointerdown', () => controls.l = true).on('pointerup', () => controls.l = false);
    this.add.text(120, 380, 'RIGHT', bStyle).setInteractive().on('pointerdown', () => controls.r = true).on('pointerup', () => controls.r = false);
    this.add.text(680, 380, 'JUMP', bStyle).setInteractive().on('pointerdown', () => { if(player.body.touching.down) player.setVelocityY(-500); });
    this.add.text(700, 20, 'SHOP', {backgroundColor:'#f00', padding:5}).setInteractive().on('pointerdown', () => document.getElementById('shop-ui').style.display='block');
}

function update() {
    if (controls.l) player.setVelocityX(-160);
    else if (controls.r) player.setVelocityX(160);
    else player.setVelocityX(0);

    // Enemy AI - turn around at edge
    enemies.children.iterate(e => {
        if(e.body.blocked.left) e.setVelocityX(100);
        else if(e.body.blocked.right) e.setVelocityX(-100);
    });
}

function buyItem(type) {
    if(score >= 30) { score -= 30; alert("Powerup Active!"); }
}
function closeShop() { document.getElementById('shop-ui').style.display='none'; }
</script>
</body>
</html>
