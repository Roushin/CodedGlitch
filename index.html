<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Pixel World</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #5c94fc; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; border: 4px solid #000; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px #000; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">GOLD: <span id="g-val">0</span> | LIVES: 3</div>
<script>
const config = {
    type: Phaser.CANVAS, // Most compatible for mobile
    width: 800, height: 450,
    backgroundColor: '#5c94fc', // Mario Sky Blue
    physics: { default: 'arcade', arcade: { gravity: { y: 1000 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, platforms, coins, enemies, goal;
let controls = { l: false, r: false };
let gold = 0;

function preload() {} // We draw our own sprites below

function create() {
    let g = this.make.graphics({ x: 0, y: 0, add: false });

    // --- DRAW MARIO-STYLE ASSETS ---
    // 1. Brick (Brown with borders)
    g.fillStyle(0x8b4513).fillRect(0, 0, 40, 40);
    g.lineStyle(2, 0x000000).strokeRect(0, 0, 40, 40);
    g.generateTexture('brick', 40, 40); g.clear();

    // 2. Hero (Red Suit, Tan Skin)
    g.fillStyle(0xff0000).fillRect(0, 0, 30, 40); // Body
    g.fillStyle(0xffdbac).fillRect(5, 5, 20, 15); // Face
    g.generateTexture('hero', 30, 40); g.clear();

    // 3. Enemy (Goomba-style Purple)
    g.fillStyle(0x800080).fillCircle(15, 15, 15);
    g.generateTexture('enemy', 30, 30); g.clear();

    // 4. Coin (Gold Circle)
    g.fillStyle(0xffff00).fillCircle(10, 10, 10);
    g.generateTexture('gold', 20, 20); g.clear();

    // --- BUILD THE WORLD ---
    platforms = this.physics.add.staticGroup();
    // Ground
    for(let i=0; i<30; i++) platforms.create(i*40, 430, 'brick');
    // Floating Platforms
    platforms.create(300, 300, 'brick'); platforms.create(340, 300, 'brick');
    platforms.create(550, 220, 'brick'); platforms.create(590, 220, 'brick');

    // Player
    player = this.physics.add.sprite(50, 350, 'hero');
    player.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // Coins
    coins = this.physics.add.group();
    [200, 300, 550, 590].forEach(x => coins.create(x, 150, 'gold').setBounceY(0.5));
    this.physics.add.collider(coins, platforms);
    this.physics.add.overlap(player, coins, (p, c) => { 
        c.destroy(); gold += 1; document.getElementById('g-val').innerText = gold; 
    });

    // Enemies
    enemies = this.physics.add.group();
    let bot = enemies.create(400, 380, 'enemy');
    bot.setVelocityX(-100).setBounce(1).setCollideWorldBounds(true);
    this.physics.add.collider(enemies, platforms);
    
    // Stomp Logic
    this.physics.add.overlap(player, enemies, (p, e) => {
        if (p.body.velocity.y > 0) { // Jumping ON them
            e.destroy();
            p.setVelocityY(-400);
        } else {
            alert("Game Over! Try again.");
            location.reload();
        }
    });

    // --- MOBILE UI BUTTONS ---
    let bStyle = { fontSize: '24px', backgroundColor: '#333', padding: 15, color: '#fff' };
    
    this.add.text(20, 370, ' LEFT ', bStyle).setInteractive()
        .on('pointerdown', () => controls.l = true).on('pointerup', () => controls.l = false);

    this.add.text(140, 370, ' RIGHT ', bStyle).setInteractive()
        .on('pointerdown', () => controls.r = true).on('pointerup', () => controls.r = false);

    this.add.text(680, 370, ' JUMP ', bStyle).setInteractive()
        .on('pointerdown', () => { if(player.body.touching.down) player.setVelocityY(-550); });
}

function update() {
    if (controls.l) player.setVelocityX(-200);
    else if (controls.r) player.setVelocityX(200);
    else player.setVelocityX(0);

    // Enemy AI - Simple Patrol
    enemies.children.iterate(e => {
        if (e && e.body.blocked.left) e.setVelocityX(100);
        if (e && e.body.blocked.right) e.setVelocityX(-100);
    });
}
</script>
</body>
</html>
