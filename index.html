<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Pixel World</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #5c94fc; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: 'Courier New', monospace; font-size: 20px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">COINS: <span id="c">0</span> | WORLD 1-1</div>
<script>
const config = {
    type: Phaser.CANVAS,
    width: 800, height: 450,
    backgroundColor: '#5c94fc',
    physics: { default: 'arcade', arcade: { gravity: { y: 1100 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, platforms, coins, enemies, controls = {};
let score = 0;

function preload() {} 

function create() {
    let g = this.make.graphics({ x: 0, y: 0, add: false });

    // --- CREATE PIXEL ART (INTERNAL) ---
    // Brick
    g.fillStyle(0x8b4513).fillRect(0, 0, 40, 40);
    g.lineStyle(2, 0x5d2e0d).strokeRect(2, 2, 36, 36);
    g.generateTexture('brick', 40, 40); g.clear();

    // Player (Mario-ish)
    g.fillStyle(0xff0000).fillRect(0, 0, 30, 40); 
    g.fillStyle(0xffdbac).fillRect(5, 5, 20, 15);
    g.fillStyle(0x000000).fillRect(20, 8, 4, 4);
    g.generateTexture('hero', 30, 40); g.clear();

    // Enemy (Goomba-ish)
    g.fillStyle(0x704010).fillRect(0, 10, 30, 20);
    g.fillStyle(0xffffff).fillRect(5, 12, 5, 5);
    g.fillStyle(0xffffff).fillRect(20, 12, 5, 5);
    g.generateTexture('goomba', 30, 30); g.clear();

    // Coin
    g.fillStyle(0xffff00).fillCircle(10, 10, 10);
    g.lineStyle(1, 0x000000).strokeCircle(10,10,10);
    g.generateTexture('coin', 20, 20); g.clear();

    // --- BUILD WORLD ---
    platforms = this.physics.add.staticGroup();
    for(let i=0; i<40; i++) platforms.create(i*40, 430, 'brick'); // Long floor
    
    // Mario-style Stairs & Floating Blocks
    platforms.create(300, 310, 'brick'); platforms.create(340, 310, 'brick');
    platforms.create(380, 310, 'brick');
    platforms.create(500, 200, 'brick');

    // Player Setup
    player = this.physics.add.sprite(50, 300, 'hero');
    player.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // Enemies (Patrolling)
    enemies = this.physics.add.group();
    [400, 600, 900].forEach(x => {
        let e = enemies.create(x, 380, 'goomba');
        e.setVelocityX(-100).setBounce(1).setCollideWorldBounds(true);
    });
    this.physics.add.collider(enemies, platforms);

    // Stomp Mechanics
    this.physics.add.overlap(player, enemies, (p, e) => {
        if (p.body.velocity.y > 0 && !p.body.touching.down) {
            e.destroy();
            p.setVelocityY(-400); // Bounce off head
        } else {
            alert("Hit by Enemy!"); location.reload();
        }
    });

    // Coins
    coins = this.physics.add.group();
    [300, 340, 380, 500].forEach(x => coins.create(x, 150, 'coin').setBounceY(0.4));
    this.physics.add.collider(coins, platforms);
    this.physics.add.overlap(player, coins, (p, c) => {
        c.destroy(); score += 10; document.getElementById('c').innerText = score;
    });

    // --- BUTTONS (FIXED FOR MOBILE) ---
    let bStyle = { fontSize: '20px', backgroundColor: '#222', padding: 15, color: '#fff', borderRadius: '10px' };
    this.add.text(20, 380, ' LEFT ', bStyle).setInteractive()
        .on('pointerdown', () => controls.l = true).on('pointerup', () => controls.l = false);
    this.add.text(130, 380, ' RIGHT ', bStyle).setInteractive()
        .on('pointerdown', () => controls.r = true).on('pointerup', () => controls.r = false);
    this.add.text(680, 380, ' JUMP ', bStyle).setInteractive()
        .on('pointerdown', () => { if(player.body.touching.down) player.setVelocityY(-580); });
}

function update() {
    if (controls.l) player.setVelocityX(-200);
    else if (controls.r) player.setVelocityX(200);
    else player.setVelocityX(0);

    // Enemy AI: Turn at walls
    enemies.children.iterate(e => {
        if(e && e.body.blocked.left) e.setVelocityX(100);
        if(e && e.body.blocked.right) e.setVelocityX(-100);
    });
}
</script>
</body>
</html>
