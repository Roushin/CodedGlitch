<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #ui-layer { 
            position: absolute; top: 10px; left: 10px; 
            color: #FFD700; font-family: sans-serif; font-weight: bold;
            text-shadow: 2px 2px #000; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui-layer">GOLD: <span id="gold-val">0</span> | HP: <span id="hp-val">100</span></div>
<script>

class MenuScene extends Phaser.Scene {
    constructor() { super('MenuScene'); }
    create() {
        this.add.text(400, 100, "THE GILDED GLITCH", { fontSize: '42px', fill: '#FFD700' }).setOrigin(0.5);
        this.add.text(400, 150, "Restore the Resolution", { fontSize: '18px', fill: '#fff' }).setOrigin(0.5);

        const chars = [
            { name: 'AXEL (Tank)', speed: 200, jump: -500, color: 0xff4444 },
            { name: 'REI (Speed)', speed: 350, jump: -600, color: 0x44ffff }
        ];

        chars.forEach((char, i) => {
            let btn = this.add.text(400, 250 + (i * 70), char.name, { 
                fontSize: '28px', backgroundColor: '#333', padding: {x: 20, y: 10} 
            }).setOrigin(0.5).setInteractive();
            
            btn.on('pointerdown', () => this.scene.start('MainGame', { char: char }));
        });
    }
}

class MainGame extends Phaser.Scene {
    constructor() { super('MainGame'); }
    
    init(data) {
        this.charData = data.char;
        this.gold = 0;
        this.playerHP = 100;
        this.bossHP = 100;
    }

    preload() {
        // Essential for mobile: provide a 1x1 white pixel to color as platforms
        this.load.image('pixel', 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==');
    }

    create() {
        // 1. Level Setup (A long strip for the stage)
        this.physics.world.setBounds(0, 0, 2000, 450);
        
        // Create Floor
        let platforms = this.physics.add.staticGroup();
        platforms.create(1000, 440, 'pixel').setScale(2000, 20).setTint(0x333333).refreshBody();
        
        // 2. Player Setup
        this.player = this.physics.add.sprite(100, 300, 'pixel').setScale(32, 48).setTint(this.charData.color);
        this.player.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, platforms);

        // 3. Boss: Gigabyte
        this.boss = this.physics.add.sprite(1800, 300, 'pixel').setScale(80, 120).setTint(0x555555);
        this.physics.add.collider(this.boss, platforms);
        
        // 4. Mobile Controls
        this.createControls();

        // 5. Camera
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.cameras.main.setBounds(0, 0, 2000, 450);
    }

    createControls() {
        let btnS = { fontSize: '24px', fill: '#fff', backgroundColor: '#222', padding: 15 };
        
        this.leftBtn = this.add.text(40, 360, "LEFT", btnS).setInteractive().setScrollFactor(0);
        this.rightBtn = this.add.text(140, 360, "RIGHT", btnS).setInteractive().setScrollFactor(0);
        this.jumpBtn = this.add.text(680, 360, "JUMP", btnS).setInteractive().setScrollFactor(0);
        this.shopBtn = this.add.text(700, 20, "SHOP", {backgroundColor:'#900', padding:5}).setInteractive().setScrollFactor(0);

        this.isLeft = false; this.isRight = false;

        this.leftBtn.on('pointerdown', () => this.isLeft = true).on('pointerup', () => this.isLeft = false);
        this.rightBtn.on('pointerdown', () => this.isRight = true).on('pointerup', () => this.isRight = false);
        this.jumpBtn.on('pointerdown', () => {
            if(this.player.body.touching.down) this.player.setVelocityY(this.charData.jump);
        });
        
        this.shopBtn.on('pointerdown', () => {
            alert("SHOP: Buy HP Potion for 50 Gold? (Feature logic coming next!)");
        });
    }

    update() {
        if (this.isLeft) this.player.setVelocityX(-this.charData.speed);
        else if (this.isRight) this.player.setVelocityX(this.charData.speed);
        else this.player.setVelocityX(0);

        // Simple Boss AI: Move toward player if player is close
        let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.boss.x, this.boss.y);
        if(dist < 400) {
            this.physics.moveToObject(this.boss, this.player, 80);
        }
    }
}

const config = {
    type: Phaser.AUTO,
    width: 800, height: 450,
    parent: 'game-container',
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, debug: false } },
    scene: [MenuScene, MainGame]
};
new Phaser.Game(config);
</script>
</body>
</html>
