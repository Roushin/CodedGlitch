<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gilded Glitch: Vector Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.CANVAS, // Forced Canvas mode for maximum mobile compatibility
    width: 800,
    height: 450,
    backgroundColor: '#1a1a2e',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1200 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, platforms, coins, boss;
let score = 0;
let gameState = 'MENU'; 
let selectedHero = null;
let controls = { l: false, r: false };

function preload() {} // No external assets to fail

function create() {
    // Generate Vector Textures
    let g = this.make.graphics({ x: 0, y: 0, add: false });

    // Hero Vector (Simple Rectangle)
    g.fillStyle(0xffffff).fillRect(0, 0, 32, 48);
    g.generateTexture('hero', 32, 48);
    g.clear();

    // Floor Vector
    g.fillStyle(0x33ff33).fillRect(0, 0, 800, 40);
    g.generateTexture('floor', 800, 40);
    g.clear();

    // Coin Vector
    g.fillStyle(0xffff00).fillCircle(8, 8, 8);
    g.generateTexture('gold', 16, 16);
    g.clear();

    showMenu(this);
}

function showMenu(scene) {
    scene.add.text(400, 100, 'GILDED GLITCH', { fontSize: '42px', fill: '#ffd700' }).setOrigin(0.5);
    
    // Axel Button
    let btn1 = scene.add.text(400, 220, ' SELECT AXEL (TANK) ', { fontSize: '24px', backgroundColor: '#800', padding: 10 }).setOrigin(0.5).setInteractive();
    btn1.on('pointerdown', () => startLevel(scene, {speed: 200, jump: -550, color: 0xff4444}));

    // Rei Button
    let btn2 = scene.add.text(400, 300, ' SELECT REI (SPEED) ', { fontSize: '24px', backgroundColor: '#008', padding: 10 }).setOrigin(0.5).setInteractive();
    btn2.on('pointerdown', () => startLevel(scene, {speed: 400, jump: -650, color: 0x44ffff}));
}

function startLevel(scene, data) {
    scene.children.removeAll(); // Clear Menu
    selectedHero = data;
    gameState = 'PLAY';

    // Physics World
    platforms = scene.physics.add.staticGroup();
    platforms.create(400, 430, 'floor');
    
    player = scene.physics.add.sprite(100, 300, 'hero').setTint(data.color);
    player.setCollideWorldBounds(true);
    scene.physics.add.collider(player, platforms);

    // Coins
    coins = scene.physics.add.group();
    for(let i=0; i<6; i++) {
        coins.create(200 + (i*100), 380, 'gold');
    }
    scene.physics.add.overlap(player, coins, (p, c) => { c.destroy(); score += 10; ui.setText('GOLD: ' + score); });

    // UI & Buttons
    let ui = scene.add.text(20, 20, 'GOLD: 0', { fontSize: '24px', fill: '#fff' });
    
    let bStyle = { fontSize: '32px', backgroundColor: '#444', padding: 15 };
    scene.add.text(50, 360, 'LEFT', bStyle).setInteractive().on('pointerdown', () => controls.l = true).on('pointerup', () => controls.l = false);
    scene.add.text(180, 360, 'RIGHT', bStyle).setInteractive().on('pointerdown', () => controls.r = true).on('pointerup', () => controls.r = false);
    scene.add.text(650, 360, 'JUMP', bStyle).setInteractive().on('pointerdown', () => { if(player.body.touching.down) player.setVelocityY(data.jump); });
}

function update() {
    if(gameState === 'PLAY' && player) {
        if(controls.l) player.setVelocityX(-selectedHero.speed);
        else if(controls.r) player.setVelocityX(selectedHero.speed);
        else player.setVelocityX(0);

        if(score >= 60 && !boss) {
            // Spawn Boss
            boss = this.physics.add.sprite(700, 300, 'hero').setScale(3).setTint(0x555555);
            this.physics.add.collider(boss, platforms);
            this.add.text(700, 150, 'BOSS', {fontSize:'20px', fill:'#f00'}).setOrigin(0.5);
        }
    }
}
</script>
</body>
</html>
